<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Industrial | Gateway Vini</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card-custom { background-color: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 15px; margin-bottom: 20px; transition: all 0.3s; }
        .card-custom:hover { border-color: #22d3ee; }
        .label-tech { font-size: 0.7rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .val-tech { font-size: 2.2rem; font-weight: bold; color: #22d3ee; }
        .val-pressao { font-size: 1.5rem; font-weight: bold; color: #e2e8f0; }
        #map { height: 350px; border-radius: 12px; border: 1px solid #334155; }
        .status-dot { height: 10px; width: 10px; background-color: #10b981; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #10b981; }
    </style>
</head>
<body>
    <div class="container-fluid px-4 py-4">
        <!-- Header -->
        <div class="row align-items-center mb-4">
            <div class="col-md-6">
                <h2 style="color: #22d3ee; margin: 0; font-weight: 700;">GATEWAY <span style="font-weight: 300;">TELEMETRIA</span></h2>
                <small class="text-muted">Canal ThingSpeak: 2402648</small>
            </div>
            <div class="col-md-6 text-right">
                <div class="card-custom d-inline-block py-2 px-4 mb-0">
                    <span class="status-dot"></span> <small class="font-weight-bold">SISTEMA ATIVO</small>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Coluna Esquerda: Principais -->
            <div class="col-lg-3">
                <div class="card-custom text-center">
                    <div class="label-tech">Peso Atual (F1)</div>
                    <div class="val-tech"><span id="peso">0.0</span><small style="font-size: 1rem"> kg</small></div>
                </div>
                <div class="card-custom text-center">
                    <div class="label-tech">Horímetro (F2)</div>
                    <div class="val-tech"><span id="horimetro">0.0</span><small style="font-size: 1rem"> h</small></div>
                </div>
                <div class="card-custom p-0 overflow-hidden">
                    <div class="p-2 label-tech text-center border-bottom border-secondary">Localização (F7/F8)</div>
                    <div id="map"></div>
                </div>
            </div>

            <!-- Coluna Central: Gráfico e Pressões -->
            <div class="col-lg-9">
                <div class="row">
                    <!-- Grid de Pressões -->
                    <div class="col-md-3">
                        <div class="card-custom text-center">
                            <div class="label-tech">P1 (F3)</div>
                            <div class="val-pressao"><span id="p1">--</span> <small class="text-muted">psi</small></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card-custom text-center">
                            <div class="label-tech">P2 (F4)</div>
                            <div class="val-pressao"><span id="p2">--</span> <small class="text-muted">psi</small></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card-custom text-center">
                            <div class="label-tech">P3 (F5)</div>
                            <div class="val-pressao"><span id="p3">--</span> <small class="text-muted">psi</small></div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card-custom text-center">
                            <div class="label-tech">P4 (F6)</div>
                            <div class="val-pressao"><span id="p4">--</span> <small class="text-muted">psi</small></div>
                        </div>
                    </div>
                </div>

                <!-- Gráfico de Peso -->
                <div class="card-custom">
                    <div class="label-tech mb-3">Histórico de Carga (Tempo Real)</div>
                    <div style="height: 400px;">
                        <canvas id="weightChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var channelID = '2402648';
        var readKey = '0HD75JEYBWU5CBRJ';
        var url = 'https://api.thingspeak.com/channels/' + channelID + '/feeds.json?api_key=' + readKey + '&results=20';
        
        var map, marker, weightChart;

        function init() {
            // Mapa inicializado (Indaial como centro padrão)
            map = L.map('map').setView([-26.89, -49.23], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            marker = L.marker([-26.89, -49.23]).addTo(map);

            // Gráfico
            var ctx = document.getElementById('weightChart').getContext('2d');
            weightChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Peso (kg)',
                        borderColor: '#22d3ee',
                        backgroundColor: 'rgba(34, 211, 238, 0.1)',
                        borderWidth: 3,
                        pointRadius: 4,
                        data: []
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        yAxes: [{ ticks: { fontColor: "#94a3b8" }, gridLines: { color: "#334155" } }],
                        xAxes: [{ ticks: { fontColor: "#94a3b8" }, gridLines: { display: false } }]
                    },
                    legend: { labels: { fontColor: '#94a3b8' } }
                }
            });
            
            update();
            setInterval(update, 15000);
        }

        function update() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', url, true);
            xhr.onload = function() {
                if (xhr.status == 200) {
                    var data = JSON.parse(xhr.responseText);
                    var feeds = data.feeds;
                    var last = feeds[feeds.length - 1];
                    
                    // Mapeamento conforme solicitado
                    document.getElementById('peso').innerHTML = parseFloat(last.field1 || 0).toFixed(1);
                    document.getElementById('horimetro').innerHTML = parseFloat(last.field2 || 0).toFixed(1);
                    document.getElementById('p1').innerHTML = last.field3 || '0';
                    document.getElementById('p2').innerHTML = last.field4 || '0';
                    document.getElementById('p3').innerHTML = last.field5 || '0';
                    document.getElementById('p4').innerHTML = last.field6 || '0';

                    // GPS (Field 7 e 8)
                    var lat = parseFloat(last.field7);
                    var lon = parseFloat(last.field8);
                    if(!isNaN(lat) && !isNaN(lon) && lat !== 0) {
                        var newPos = new L.LatLng(lat, lon);
                        marker.setLatLng(newPos);
                        map.panTo(newPos);
                    }

                    // Gráfico
                    weightChart.data.labels = feeds.map(function(f) { return f.created_at.substring(11, 19); });
                    weightChart.data.datasets[0].data = feeds.map(function(f) { return parseFloat(f.field1); });
                    weightChart.update();
                }
            };
            xhr.send();
        }

        window.onload = init;
    </script>
</body>
</html>
