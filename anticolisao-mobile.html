:root {
  --paper: #EDF0E7;
  --paper-raised: #E2E7D9;
  --card-bg: #F6F8F2;
  --ink: #1E2118;
  --ink-soft: #565C4B;
  --ink-faint: #7C8271;
  --steel: #33525E;
  --steel-soft: #6C8891;
  --accent: #BE4E17;
  --accent-ink: #FFFFFF;
  --good: #3E6B44;
  --good-bg: #DCE8DC;
  --warning: #8C6417;
  --warning-bg: #EFE3C4;
  --critical: #963528;
  --line: #C7CDB9;
  --line-strong: #A8AF97;
  --shadow: 0 1px 0 rgba(30,33,24,0.05);
}

@media (prefers-color-scheme: dark) {
  :root {
    --paper: #191B16;
    --paper-raised: #21241C;
    --card-bg: #20231B;
    --ink: #E8EBDF;
    --ink-soft: #A6AC98;
    --ink-faint: #767C68;
    --steel: #8FB2BC;
    --steel-soft: #4E6C76;
    --accent: #E07A3C;
    --accent-ink: #1A1200;
    --good: #82BC85;
    --good-bg: #223324;
    --warning: #D9AE58;
    --warning-bg: #362C15;
    --critical: #DA8577;
    --line: #363A2D;
    --line-strong: #454A39;
    --shadow: 0 1px 0 rgba(0,0,0,0.2);
  }
}

:root[data-theme="dark"] {
  --paper: #191B16;
  --paper-raised: #21241C;
  --card-bg: #20231B;
  --ink: #E8EBDF;
  --ink-soft: #A6AC98;
  --ink-faint: #767C68;
  --steel: #8FB2BC;
  --steel-soft: #4E6C76;
  --accent: #E07A3C;
  --accent-ink: #1A1200;
  --good: #82BC85;
  --good-bg: #223324;
  --warning: #D9AE58;
  --warning-bg: #362C15;
  --critical: #DA8577;
  --line: #363A2D;
  --line-strong: #454A39;
  --shadow: 0 1px 0 rgba(0,0,0,0.2);
}

:root[data-theme="light"] {
  --paper: #EDF0E7;
  --paper-raised: #E2E7D9;
  --card-bg: #F6F8F2;
  --ink: #1E2118;
  --ink-soft: #565C4B;
  --ink-faint: #7C8271;
  --steel: #33525E;
  --steel-soft: #6C8891;
  --accent: #BE4E17;
  --accent-ink: #FFFFFF;
  --good: #3E6B44;
  --good-bg: #DCE8DC;
  --warning: #8C6417;
  --warning-bg: #EFE3C4;
  --critical: #963528;
  --line: #C7CDB9;
  --line-strong: #A8AF97;
  --shadow: 0 1px 0 rgba(30,33,24,0.05);
}

* { box-sizing: border-box; }

html { background: var(--paper); }

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: 'IBM Plex Sans', -apple-system, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--steel); }

.wrap {
  max-width: 1120px;
  margin: 0 auto;
  padding: 0 28px;
}

/* ---------- Header / hero ---------- */

header.hero {
  padding: 64px 0 48px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.eyebrow::before {
  content: "";
  width: 22px;
  height: 2px;
  background: var(--accent);
  display: inline-block;
}

h1.title {
  font-family: 'Oswald', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  font-size: clamp(2.4rem, 5.4vw, 4.1rem);
  line-height: 0.98;
  letter-spacing: 0.002em;
  margin: 0 0 22px;
  color: var(--ink);
  text-wrap: balance;
  max-width: 16ch;
}

.lede {
  font-size: 1.08rem;
  color: var(--ink-soft);
  max-width: 62ch;
  margin: 0 0 28px;
}

.lede strong { color: var(--ink); font-weight: 600; }

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.meta-chip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  padding: 6px 12px;
  border: 1px solid var(--line-strong);
  color: var(--ink-soft);
  display: inline-flex;
  align-items: center;
  gap: 7px;
}

.meta-chip .dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
}

/* ---------- Section scaffolding ---------- */

section {
  padding: 56px 0;
  border-bottom: 1px solid var(--line);
}

.section-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 24px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

h2.section-title {
  font-family: 'Oswald', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  font-size: 1.7rem;
  letter-spacing: 0.01em;
  margin: 0;
  color: var(--ink);
}

.section-note {
  font-size: 0.92rem;
  color: var(--ink-faint);
  max-width: 46ch;
}

/* ---------- Diagram ---------- */

.diagram-card {
  border: 1px solid var(--line);
  background: var(--paper-raised);
  padding: 28px;
}

.diagram-svg {
  width: 100%;
  height: auto;
  display: block;
}

.diagram-svg text {
  font-family: 'IBM Plex Mono', monospace;
}

.diagram-legend {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px dashed var(--line-strong);
}

.legend-item { display: flex; gap: 10px; align-items: flex-start; }

.legend-swatch {
  width: 10px; height: 10px;

<script>
(function () {
  var X0 = 60, X1 = 720, Y0 = 260, Y1 = 20;

  var MODELS = {
    '5570li': { name: '5570LI', L0: 1.77, L1: 3.190, L2: 2.080 },
    '7700li': { name: '7700LI', L0: 1.77, L1: 3.790, L2: 2.390 },
    '8800li': { name: '8800LI', L0: 1.77, L1: 3.975, L2: 2.795 }
  };
  var GLOBAL_MAX_REACH = 0;
  for (var mk in MODELS) {
    var mr = MODELS[mk].L0 + MODELS[mk].L1 + MODELS[mk].L2;
    if (mr > GLOBAL_MAX_REACH) GLOBAL_MAX_REACH = mr;
  }

  function hElbow(t1deg, l0, l1) { return l0 + l1 * Math.sin(t1deg * Math.PI / 180); }
  function hTip(t1deg, t2deg, l0, l1, l2) {
    var t1 = t1deg * Math.PI / 180, t2 = t2deg * Math.PI / 180;
    return l0 + l1 * Math.sin(t1) + l2 * Math.sin(t1 - t2);
  }
  function hMax(t1deg, t2deg, l0, l1, l2) { return Math.max(hElbow(t1deg, l0, l1), hTip(t1deg, t2deg, l0, l1, l2)); }

  function theta1Crit(t2deg, limite, l0, l1, l2) {
    if (hElbow(0, l0, l1) >= limite) return 0;
    if (hMax(90, t2deg, l0, l1, l2) < limite) return 90;
    var lo = 0, hi = 90;
    for (var i = 0; i < 50; i++) {
      var mid = (lo + hi) / 2;
      if (hMax(mid, t2deg, l0, l1, l2) < limite) lo = mid; else hi = mid;
    }
    return hi;
  }

  function mapx(t2) { return X0 + (t2 / 180) * (X1 - X0); }
  function mapy(t1) { return Y0 + (t1 / 90) * (Y1 - Y0); }
  function fmt1(n) { return n.toLocaleString('pt-BR', { minimumFractionDigits: 1, maximumFractionDigits: 1 }); }
  function fmt2(n) { return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmt3(n) { return n.toLocaleString('pt-BR', { minimumFractionDigits: 3, maximumFractionDigits: 3 }); }

  function render() {
    var teto = parseFloat(document.getElementById('in-teto').value);
    var margem = parseFloat(document.getElementById('in-margem').value);
    var warn = document.getElementById('case-warning');
    warn.textContent = '';

    if (isNaN(teto) || isNaN(margem) || teto <= 0 || margem < 0) {
      warn.textContent = 'Preencha teto e margem com números válidos.';
      return;
    }
    var limite = teto - margem;
    if (limite <= 0) {
      warn.textContent = 'Margem maior ou igual ao teto — não sobra limite de alarme.';
      return;
    }

    // versao mobile: sem cartoes de constantes nem grafico estatico, so a simulacao ao vivo

    var t1crit0 = theta1Crit(0, limite, live.L0, live.L1, live.L2);
    var capArg = (limite - live.L0) / live.L1;
    var findingHtml;

    if (capArg >= 0 && capArg <= 1) {
      var capDeg = Math.asin(capArg) * 180 / Math.PI;
      findingHtml = '<b>Achado do modelo:</b> o braço sozinho já bate o teto acima de <b>θ1 ≈ ' + fmt1(capDeg) + '°</b>, não importa o que a lança esteja fazendo — é o cotovelo que vira o ponto crítico nesse regime, não a ponta. Só abaixo desse ângulo a lança volta a mandar: com ela totalmente aberta (θ2=0°), o alarme já deveria disparar a partir de θ1≈' + fmt1(t1crit0) + '°, subindo até ' + fmt1(capDeg) + '° conforme ela vai fechando.';
    } else if (capArg > 1) {
      findingHtml = '<b>Achado do modelo:</b> com esse teto, o cotovelo sozinho nunca alcança o limite (mesmo com o braço todo em pé) — só a ponta da lança manda. Com ela totalmente aberta (θ2=0°), o alarme dispara a partir de θ1≈' + fmt1(t1crit0) + '°.';
    } else {
      findingHtml = '<b>Achado do modelo:</b> com esse teto tão baixo, o cotovelo já ultrapassa o limite mesmo com o braço deitado (θ1=0°) — nesse cenário o alarme deveria ficar sempre ativo, a grua não tem posição segura de trabalho normal.';
    }
    document.getElementById('case-finding-text').innerHTML = findingHtml;

    live.teto = teto;
    live.margem = margem;
    live.limite = limite;
    layoutLive();
  }

  // ---- animacao ao vivo ----
  var live = {
    teto: 6, margem: 1, limite: 5, scale: 60, groundY: 610, pivotX: 450,
    modelKey: '8800li', modelName: '8800LI', L0: 1.77, L1: 3.975, L2: 2.795
  };

  function arcPts(center, u, v, r, fromDeg, toDeg, step) {
    var pts = [];
    for (var d = fromDeg; d <= toDeg + 0.01; d += step) {
      var rad = d * Math.PI / 180;
      var x = center[0] + r * (Math.cos(rad) * u[0] + Math.sin(rad) * v[0]);
      var y = center[1] + r * (Math.cos(rad) * u[1] + Math.sin(rad) * v[1]);
      pts.push(x.toFixed(1) + ',' + y.toFixed(1));
    }
    return pts.join(' ');
  }
  function ptAt(center, u, v, r, deg) {
    var rad = deg * Math.PI / 180;
    return [center[0] + r * (Math.cos(rad) * u[0] + Math.sin(rad) * v[0]),
            center[1] + r * (Math.cos(rad) * u[1] + Math.sin(rad) * v[1])];
  }
  function setText(id, pt) {
    var el = document.getElementById(id);
    el.setAttribute('x', pt[0].toFixed(1)); el.setAttribute('y', pt[1].toFixed(1));
  }

  function layoutLive() {
    var topMargin = 30;
    var available = live.groundY - topMargin;
    // escala global fixa (baseada no maior modelo do catalogo) + 20% de aumento — nunca recalculada
    // por modelo ou por teto, so o chao desceu e o desenho cresceu como um todo
    live.scale = (available / (GLOBAL_MAX_REACH * 1.15)) * 1.1;

    var ceilY = live.groundY - live.teto * live.scale;
    var limitY = live.groundY - live.limite * live.scale;
    var colTopY = live.groundY - live.L0 * live.scale;

    document.getElementById('live-ground').setAttribute('y1', live.groundY);
    document.getElementById('live-ground').setAttribute('y2', live.groundY);

    document.getElementById('live-ceil').setAttribute('y1', ceilY);
    document.getElementById('live-ceil').setAttribute('y2', ceilY);
    var ceilLbl = document.getElementById('live-ceil-label');
    ceilLbl.setAttribute('y', ceilY - 8);
    ceilLbl.textContent = 'TETO ' + fmt1(live.teto) + ' m';

    document.getElementById('live-limit').setAttribute('y1', limitY);
    document.getElementById('live-limit').setAttribute('y2', limitY);
    var limLbl = document.getElementById('live-limit-label');
    limLbl.setAttribute('y', limitY + 18);
    limLbl.textContent = 'LIMITE DE ALARME ' + fmt1(live.limite) + ' m';

    var col = document.getElementById('live-column');
    col.setAttribute('y', colTopY);
    col.setAttribute('width', 54);
    col.setAttribute('height', live.groundY - colTopY);

    live.pivot = [live.pivotX, colTopY];

    // transferidor theta1: fixo no pivo, 0deg=horizontal, cresce subindo
    var pivot = live.pivot;
    var uh = [-1, 0], vh = [0, -1];
    var rArc1 = 0.85 * live.scale, rLbl1 = 1.12 * live.scale;
    document.getElementById('live-t1-ref').setAttribute('x1', pivot[0]);
    document.getElementById('live-t1-ref').setAttribute('y1', pivot[1]);
    var refEnd1 = ptAt(pivot, uh, vh, rLbl1 * 1.05, 0);
    document.getElementById('live-t1-ref').setAttribute('x2', refEnd1[0]);
    document.getElementById('live-t1-ref').setAttribute('y2', refEnd1[1]);
    document.getElementById('live-t1-arc').setAttribute('points', arcPts(pivot, uh, vh, rArc1, 0, 90, 5));
    setText('live-t1-lbl0', ptAt(pivot, uh, vh, rLbl1, 0));
    setText('live-t1-lbl30', ptAt(pivot, uh, vh, rLbl1, 30));
    setText('live-t1-lbl60', ptAt(pivot, uh, vh, rLbl1, 60));
    setText('live-t1-lbl90', ptAt(pivot, uh, vh, rLbl1, 90));
    setText('live-t1-axis', ptAt(pivot, uh, vh, rArc1 * 0.8, 45));

    // dimensao da coluna (fixa, so muda com a escala)
    var colMid = [pivot[0], (pivot[1] + live.groundY) / 2];
    var dimCol = document.getElementById('live-dim-col');
    dimCol.setAttribute('x', colMid[0] + 40);
    dimCol.setAttribute('y', colMid[1]);
    dimCol.textContent = 'coluna ' + fmt2(live.L0) + ' m';
  }

  function drawLivePose(t2deg) {
    var t1deg = theta1Crit(t2deg, live.limite, live.L0, live.L1, live.L2);
    var t1 = t1deg * Math.PI / 180, t2 = t2deg * Math.PI / 180;
    var pivot = live.pivot;
    var u = [-Math.cos(t1), -Math.sin(t1)];
    var v = [-Math.sin(t1), Math.cos(t1)];
    var elbow = [pivot[0] + live.L1 * live.scale * u[0], pivot[1] + live.L1 * live.scale * u[1]];
    var ldir = [Math.cos(t2) * u[0] + Math.sin(t2) * v[0], Math.cos(t2) * u[1] + Math.sin(t2) * v[1]];
    var wrist = [elbow[0] + live.L2 * live.scale * ldir[0], elbow[1] + live.L2 * live.scale * ldir[1]];

    var boom = document.getElementById('live-boom');
    boom.setAttribute('x1', pivot[0]); boom.setAttribute('y1', pivot[1]);
    boom.setAttribute('x2', elbow[0]); boom.setAttribute('y2', elbow[1]);
    var arm = document.getElementById('live-arm');
    arm.setAttribute('x1', elbow[0]); arm.setAttribute('y1', elbow[1]);
    arm.setAttribute('x2', wrist[0]); arm.setAttribute('y2', wrist[1]);

    setCircle('live-joint-pivot', pivot);
    setCircle('live-joint-elbow', elbow);
    setCircle('live-joint-wrist', wrist);

    var he = hElbow(t1deg, live.L0, live.L1), ht = hTip(t1deg, t2deg, live.L0, live.L1, live.L2);
    var binding = he >= ht - 0.01 ? 'cotovelo' : 'ponta';
    var markElbow = document.getElementById('live-mark-elbow');
    var markWrist = document.getElementById('live-mark-wrist');
    var markLine = document.getElementById('live-mark-line');
    setCircle('live-mark-elbow', elbow);
    setCircle('live-mark-wrist', wrist);
    markElbow.style.fill = binding === 'cotovelo' ? 'var(--accent)' : 'var(--steel-soft)';
    markWrist.style.fill = binding === 'ponta' ? 'var(--accent)' : 'var(--steel-soft)';
    var limitY = live.groundY - live.limite * live.scale;
    var bindPt = binding === 'cotovelo' ? elbow : wrist;
    markLine.setAttribute('x1', bindPt[0]); markLine.setAttribute('x2', bindPt[0]);
    markLine.setAttribute('y1', bindPt[1]); markLine.setAttribute('y2', limitY);

    document.getElementById('live-readout').textContent =
      'θ1=' + fmt1(t1deg) + '°  θ2=' + fmt1(t2deg) + '°  ·  limitante: ' + binding;

    // transferidor theta2: preso no cotovelo, 0deg=lanca em linha com o braco, cresce dobrando p/ baixo
    var rArc2 = 0.6 * live.scale, rLbl2 = 0.8 * live.scale;
    document.getElementById('live-t2-ref').setAttribute('x1', elbow[0]);
    document.getElementById('live-t2-ref').setAttribute('y1', elbow[1]);
    var refEnd2 = ptAt(elbow, u, v, rLbl2 * 1.05, 0);
    document.getElementById('live-t2-ref').setAttribute('x2', refEnd2[0]);
    document.getElementById('live-t2-ref').setAttribute('y2', refEnd2[1]);
    document.getElementById('live-t2-arc').setAttribute('points', arcPts(elbow, u, v, rArc2, 0, 180, 5));
    setText('live-t2-lbl0', ptAt(elbow, u, v, rLbl2, 0));
    setText('live-t2-lbl90', ptAt(elbow, u, v, rLbl2, 90));
    setText('live-t2-lbl180', ptAt(elbow, u, v, rLbl2, 180));
    setText('live-t2-axis', ptAt(elbow, u, v, rArc2 * 0.75, 45));

    // dimensoes do braco e da lanca (seguem os segmentos a cada frame)
    var boomMid = [(pivot[0] + elbow[0]) / 2, (pivot[1] + elbow[1]) / 2];
    var boomDir = [elbow[0] - pivot[0], elbow[1] - pivot[1]];
    var boomLen = Math.hypot(boomDir[0], boomDir[1]) || 1;
    var boomPerp = [boomDir[1] / boomLen, -boomDir[0] / boomLen];
    var dimBoom = document.getElementById('live-dim-boom');
    dimBoom.setAttribute('x', boomMid[0] + boomPerp[0] * 22 - 14);
    dimBoom.setAttribute('y', boomMid[1] + boomPerp[1] * 22);
    dimBoom.textContent = 'braço ' + fmt3(live.L1) + ' m';

    var armMid = [(elbow[0] + wrist[0]) / 2, (elbow[1] + wrist[1]) / 2];
    var armDir = [wrist[0] - elbow[0], wrist[1] - elbow[1]];
    var armLen = Math.hypot(armDir[0], armDir[1]) || 1;
    var armPerp = [armDir[1] / armLen, -armDir[0] / armLen];
    var dimArm = document.getElementById('live-dim-arm');
    dimArm.setAttribute('x', armMid[0] + armPerp[0] * 20);
    dimArm.setAttribute('y', armMid[1] + armPerp[1] * 20);
    dimArm.textContent = 'lança ' + fmt3(live.L2) + ' m';
  }

  function setCircle(id, pt) {
    var el = document.getElementById(id);
    el.setAttribute('cx', pt[0]); el.setAttribute('cy', pt[1]);
  }

  var PERIOD_MS = 9000;
  function tick(ts) {
    var phase = (ts % PERIOD_MS) / PERIOD_MS; // 0..1
    var tri = phase < 0.5 ? phase * 2 : 2 - phase * 2; // 0->1->0 (ping-pong)
    drawLivePose(tri * 180);
    requestAnimationFrame(tick);
  }

  document.getElementById('in-teto').setAttribute('max', GLOBAL_MAX_REACH.toFixed(2));

  function applyModel(key) {
    var m = MODELS[key];
    live.modelKey = key; live.modelName = m.name;
    live.L0 = m.L0; live.L1 = m.L1; live.L2 = m.L2;
    document.getElementById('live-model-label').textContent = 'HFORT ' + m.name;
    render();
  }

  document.getElementById('in-teto').addEventListener('input', render);
  document.getElementById('in-margem').addEventListener('input', render);
  document.getElementById('in-model').addEventListener('change', function (e) {
    applyModel(e.target.value);
  });

  document.querySelectorAll('.step-btn').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var input = document.getElementById(btn.getAttribute('data-target'));
      var dir = parseFloat(btn.getAttribute('data-dir'));
      var step = parseFloat(input.getAttribute('step')) || 1;
      var min = parseFloat(input.getAttribute('min'));
      var max = parseFloat(input.getAttribute('max'));
      var val = (parseFloat(input.value) || 0) + dir * step;
      if (!isNaN(min)) val = Math.max(min, val);
      if (!isNaN(max)) val = Math.min(max, val);
      input.value = val.toFixed(1);
      input.dispatchEvent(new Event('input', { bubbles: true }));
    });
  });

  applyModel(live.modelKey);
  requestAnimationFrame(tick);
})();
</script>

</body>
</html>
